interface:
  display_name: "peticion-http"
  short_description: "Standardize outbound HTTP integrations with utils_oas"
  default_prompt: "Use $peticion-http to review, refactor, or implement outbound HTTP integrations in Go APIs using github.com/udistrital/utils_oas@v0.5.0-beta.2. Unless the user explicitly limits scope, assume repo-wide review even if they mention only one flow or file. If the user corrects the target utils_oas version, that correction overrides any prior assumption immediately; do not keep reasoning about beta.1 once the active context says v0.5.0-beta.2. Treat any previously cached or downloaded local copy of utils_oas as untrusted by default. Do not accept a local `replace`, checkout, fork, or `vendor/` copy of github.com/udistrital/utils_oas as valid evidence of version or symbol availability. Refresh the dependency with `go get github.com/udistrital/utils_oas@v0.5.0-beta.2`, then run `go mod tidy` and verify with `go list -m -json github.com/udistrital/utils_oas`. Before accepting symbol availability or lack of coverage, prefer creating an isolated temporary `GOMODCACHE` outside the workspace and download github.com/udistrital/utils_oas@v0.5.0-beta.2 there for inspection; only if that is not viable should you clean modcache and redownload in the normal cache. Never create .gomodcache, .gocache, tmp-go-build or any other cache or temporary directory inside the workspace or repository. If the environment blocks every external temporary path and the only remaining option would be to create caches inside the repo, stop and report that infrastructure blocker instead of doing it. In the cache used for verification, run `go list -m -json github.com/udistrital/utils_oas` and treat any `Replace` or resolution outside that verified cache as a blocker. If the environment blocks both approaches, use remote validation via curl to https://raw.githubusercontent.com/udistrital/utils_oas/v0.5.0-beta.2/request/request.go to confirm symbols exist in the tag, but still report the work as incomplete due to infrastructure blocks. If the tag content was already confirmed by the user or prior reliable evidence, do not treat local failure to find `PostWithContext`/`PutWithContext`/`PatchWithContext`/`DeleteWithContext` as a valid reason to keep `SendJson`/`SendJson2`; that indicates an environment or resolution problem, not lack of coverage. In covered cases, the final target must be request.GetWithContext/request.PostWithContext/request.PutWithContext/request.PatchWithContext/request.DeleteWithContext; modify signatures and call sites to propagate the incoming request context through controller/handler, service, helper, repository, or provider layers. Do not leave helper pass-throughs in helpers/utilidades.go or equivalent files: if wrappers such as sendJson, sendJson3, getJson, GetJsonTest or GetJsonWSO2Test are still present as generic HTTP helpers, the migration is incomplete even if they internally delegate to utils_oas. In covered cases, migrate the call sites and delete the wrapper instead of reimplementing it locally. Only keep historical request/requestresponse functions when request.*WithContext truly does not preserve behavior, and document why. Always match the real HTTP verb to the equivalent utils_oas function instead of net/http or parallel helpers. Before closing, run a repo-wide textual audit focused on production code for remnant historical functions, direct HTTP usage, wrappers in utilidades.go or equivalent files, and context.Background/context.TODO patterns unless the user explicitly narrowed scope. Report findings in tests separately; they do not make the migration incomplete by themselves unless they break validation. Validate the result against the current SKILL.md Definition of Done and mandatory output format. If any production exception, historical function, wrapper, mispropagated context, unresolved cache verification, local replace, vendor-based validation, missing isolated-cache or modcache refresh verification, missing repo-wide audit, or any cache/temporary artifact created inside the workspace remains or was created during execution, do not present the work as completed: report `Estado: incompleto` and include `Alcance asumido`, `Archivos o usos remanentes`, `Bloqueos o excepciones abiertas`, `Verificaciones ejecutadas`, and `Siguiente acción concreta`."
